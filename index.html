<!DOCTYPE html>
<html>
<head>
    <title>Q4 Seatwork 1</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#e8e5d6;
            font-family:Arial;
        }

        .box{
            background:#5f6f92;
            padding:20px;
            border-radius:20px;
            width:500px;
            margin:auto;
            margin-top:120px;
            color:white;
        }

        button{
            background:#779c4d;
            border:none;
            padding:8px 15px;
            border-radius:5px;
        }

        input{
            padding:5px;
            width:200px;
        }

        .error{
            color:red;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="box text-center">

    <form>
    <h2>Log In</h2>
    <p>Please enter your account details</p>
    <label>Username</label><br>
    <input type="text" id="user" placeholder="Enter Username"><br>
    <label>Password</label><br>
    <input type="password" id="pass" placeholder="Enter Password"><br>
    <button onclick="log_in()">Log In</button>
    </form>
    <script src="main.js"></script>


</body>
</html>
